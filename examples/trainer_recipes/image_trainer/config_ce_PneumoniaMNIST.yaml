# ----------------------------------------------------------
# Dataset
# ----------------------------------------------------------
dataset:
  name: PneumoniaMNIST
  eval_splits: [val, test]

# ----------------------------------------------------------
# Model
# ----------------------------------------------------------
model:
  name: resnet18
  pretrained: false

# ----------------------------------------------------------
# Evaluation metrics
# ----------------------------------------------------------
metrics:
  - AUROC

# ----------------------------------------------------------
# Training
# ----------------------------------------------------------
training:
  # --- Experiment tracking ---
  project_name: libauc
  experiment_name: resnet18_ce_PneumoniaMNIST

  # --- Core hyperparameters ---
  epochs: 60
  batch_size: 128
  eval_batch_size: 256
  sampling_rate: 0.5
  num_workers: 0
  SEED: 123

  # --- Loss function ---
  loss: BCELoss
  loss_kwargs: {}

  # --- Optimizer ---
  optimizer: Adam
  optimizer_kwargs:
    lr: 1.0e-3
    weight_decay: 1.0e-4

  # --- LR decay ---
  decay_epochs: [0.5, 0.75]

  # --- Checkpointing ---
  output_path: ./output
  resume_from_checkpoint: false
  save_checkpoint_every: 10
  verbose: 1
