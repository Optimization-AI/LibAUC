# ----------------------------------------------------------
# Dataset
# ----------------------------------------------------------
dataset:
  name: cifar10
  eval_splits: [val, test]
  kwargs:
    imratio: 0.1

# ----------------------------------------------------------
# Model
# ----------------------------------------------------------
model:
  name: resnet18
  pretrained: true
  pretrained_path: "./output/resnet18_ce_cifar10/epoch_100.pt"

# ----------------------------------------------------------
# Evaluation metrics
# ----------------------------------------------------------
metrics:
  - AUROC

# ----------------------------------------------------------
# Training
# ----------------------------------------------------------
training:
  # --- Experiment tracking ---
  project_name: libauc
  experiment_name: resnet18_AUCMLoss_cifar10

  # --- Core hyperparameters ---
  epochs: 100
  batch_size: 128
  eval_batch_size: 256
  sampling_rate: 0.2
  num_workers: 2
  SEED: 2026

  # --- Loss function ---
  loss: AUCMLoss
  loss_kwargs:
    margin: 1.0

  # --- Optimizer ---
  optimizer: PESG
  optimizer_kwargs:
    lr: 0.1
    epoch_decay: 0.002
    weight_decay: 1.0e-5
    momentum: 0.9

  # --- LR decay ---
  decay_epochs: [0.5, 0.75]

  # --- Checkpointing ---
  output_path: ./output
  resume_from_checkpoint: false
  save_checkpoint_every: 5
  verbose: 1
